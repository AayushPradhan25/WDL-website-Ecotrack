<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complaint Details | Admin Panel | Eco Smart</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../style.css">

    <style>
        /* --- CSS Variables --- */
        
         :root {
            --primary-green: #2e7d5e;
            --bg-light: #f3f4f6;
            --sidebar-dark: #111827;
            --sidebar-hover: #1f2937;
            --text-dark: #1f2937;
            --text-muted: #6b7280;
            --white: #ffffff;
            --border-color: #e5e7eb;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --transition: all 0.3s ease;
        }
        /* --- Global Reset & Layout --- */
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, sans-serif;
        }
        
        body {
            background-color: var(--bg-light);
            color: var(--text-dark);
            overflow-x: hidden;
        }

        /* --- Sidebar --- */

        .sidebar-header {
            padding: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .sidebar-header h2 {
            font-size: 1.25rem;
            font-weight: 700;
        }
        
        .sidebar-header i {
            color: var(--primary-green);
            font-size: 1.5rem;
        }
        
        .sidebar-nav {
            padding: 1rem 0;
            flex-grow: 1;
        }
        
        .sidebar-nav a {
            display: flex;
            align-items: center;
            padding: 0.875rem 1.5rem;
            color: #d1d5db;
            text-decoration: none;
            font-size: 0.95rem;
            transition: var(--transition);
            border-left: 4px solid transparent;
        }
        
        .sidebar-nav a i {
            width: 24px;
            margin-right: 0.75rem;
            font-size: 1.1rem;
            text-align: center;
        }
        
        .sidebar-nav a:hover,
        .sidebar-nav a.active {
            background-color: var(--sidebar-hover);
            color: var(--white);
            border-left-color: var(--primary-green);
        }
        /* --- Main Content & Top Bar --- */

        .page-title {
            font-size: 1.5rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .logout-btn {
            background-color: transparent;
            color: #ef4444;
            border: 1px solid #ef4444;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
        }
        
        .logout-btn:hover {
            background-color: #ef4444;
            color: var(--white);
        }
        
        .content-wrapper {
            padding: 2rem;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }
        /* --- Buttons --- */
        
        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
            transition: var(--transition);
            margin-bottom: 1.5rem;
        }
        
        .btn-back:hover {
            color: var(--primary-green);
        }
        
        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            border: none;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        
        .btn-primary {
            background-color: var(--primary-green);
            color: var(--white);
        }
        
        .btn-primary:hover {
            background-color: #1a533d;
            box-shadow: 0 4px 12px rgba(46, 125, 94, 0.2);
        }
        /* --- Details Card --- */
        
        .card {
            background-color: var(--white);
            border-radius: 12px;
            box-shadow: var(--shadow-md);
            overflow: hidden;
            padding: 2.5rem;
        }
        
        .complaint-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 1rem;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border-color);
            flex-wrap: wrap;
        }
        
        .complaint-title h2 {
            font-size: 1.75rem;
            color: var(--text-dark);
            margin-bottom: 0.5rem;
        }
        
        .complaint-title p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }
        
        .description-box {
            background-color: #f8fafc;
            border-left: 4px solid var(--primary-green);
            padding: 1.5rem;
            border-radius: 0 8px 8px 0;
            margin-bottom: 2rem;
        }
        
        .description-box h4 {
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 0.75rem;
        }
        
        .description-box p {
            color: var(--text-dark);
            line-height: 1.6;
            font-size: 1.05rem;
        }
        
        .details-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 2rem;
            margin-bottom: 2.5rem;
        }
        
        .detail-item {
            display: flex;
            align-items: flex-start;
            gap: 1rem;
        }
        
        .detail-icon {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            background-color: #eff6ff;
            color: #3b82f6;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.25rem;
            flex-shrink: 0;
        }
        
        .detail-icon.loc {
            background-color: #ecfdf5;
            color: #10b981;
        }
        
        .detail-icon.date {
            background-color: #fef3c7;
            color: #d97706;
        }
        
        .detail-text h4 {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 0.25rem;
        }
        
        .detail-text p {
            font-size: 1rem;
            color: var(--text-dark);
            font-weight: 500;
        }
        /* --- Badges --- */
        
        .badge {
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 600;
            text-transform: capitalize;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }
        
        .badge-pending {
            background-color: #fef3c7;
            color: #92400e;
        }
        
        .badge-resolved {
            background-color: #d1fae5;
            color: #065f46;
        }
        
        .badge-in-progress {
            background-color: #dbeafe;
            color: #1e40af;
        }
        
        .badge-rejected {
            background-color: #fee2e2;
            color: #991b1b;
        }
        /* --- Error State --- */
        
        .error-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-muted);
        }
        
        .error-state i {
            font-size: 4rem;
            color: #d1d5db;
            margin-bottom: 1rem;
        }
        
        .error-state h3 {
            font-size: 1.25rem;
            color: var(--text-dark);
            margin-bottom: 0.5rem;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
    <div class="admin-container">
        <aside class="admin-sidebar"></aside>

        <main class="admin-main">
            <header class="admin-top-bar"></header>

            <div class="content-wrapper">
                <a href="complaints.html" class="btn-back"><i class="fas fa-arrow-left"></i> Back to Complaints</a>

                <div id="complaintDetailsContainer">
                </div>
            </div>
        </main>
    </div>

    <script src="../config.js"></script>
    <script src="../script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');
            const container = document.getElementById('complaintDetailsContainer');

            // Safely fetch complaint
            const allComplaints = (window.mockData && window.mockData.complaints) ? window.mockData.complaints : [];
            const comp = allComplaints.find(c => c.id == id);

            // Helper to get badge styling
            const getStatusBadge = (status) => {
                const s = status.toLowerCase();
                if (s.includes('pending')) return {
                    class: 'badge-pending',
                    icon: 'fa-clock'
                };
                if (s.includes('resolved')) return {
                    class: 'badge-resolved',
                    icon: 'fa-check-circle'
                };
                if (s.includes('progress')) return {
                    class: 'badge-in-progress',
                    icon: 'fa-spinner'
                };
                if (s.includes('rejected')) return {
                    class: 'badge-rejected',
                    icon: 'fa-times-circle'
                };
                return {
                    class: 'badge-pending',
                    icon: 'fa-circle'
                };
            };

            if (comp) {
                const badge = getStatusBadge(comp.status);

                container.innerHTML = `
                    <div class="card">
                        <div class="complaint-header">
                            <div class="complaint-title">
                                <h2>${comp.title}</h2>
                                <p>Complaint Reference ID: #${comp.id}</p>
                            </div>
                            <div class="complaint-status">
                                <span class="badge ${badge.class}">
                                    <i class="fas ${badge.icon}"></i> ${comp.status}
                                </span>
                            </div>
                        </div>

                        <div class="description-box">
                            <h4>Description of Issue</h4>
                            <p>${comp.description || 'No detailed description provided by the user.'}</p>
                        </div>

                        <div class="details-grid">
                            <div class="detail-item">
                                <div class="detail-icon loc"><i class="fas fa-map-marker-alt"></i></div>
                                <div class="detail-text">
                                    <h4>Reported Location</h4>
                                    <p>${comp.location}</p>
                                </div>
                            </div>
                            
                            <div class="detail-item">
                                <div class="detail-icon date"><i class="fas fa-calendar-day"></i></div>
                                <div class="detail-text">
                                    <h4>Date Submitted</h4>
                                    <p>${comp.date || 'Unknown Date'}</p>
                                </div>
                            </div>
                        </div>

                        <hr style="border: 0; border-top: 1px solid var(--border-color); margin-bottom: 2rem;">

                        <div style="display: flex; gap: 1rem;">
                            <a href="complaint-update.html?id=${comp.id}" class="btn btn-primary">
                                <i class="fas fa-edit"></i> Update Status
                            </a>
                        </div>
                    </div>
                `;
            } else {
                container.innerHTML = `
                    <div class="card error-state">
                        <i class="fas fa-search"></i>
                        <h3>Complaint Not Found</h3>
                        <p>We couldn't locate the details for this report. It may have been removed.</p>
                    </div>
                `;
            }
        });
    </script>
</body>

</html>
