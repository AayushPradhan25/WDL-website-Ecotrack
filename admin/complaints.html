<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Complaints Management | EcoSmart Admin</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../style.css">
<style>

.content-wrapper{padding:1.75rem 2rem;flex:1;}
.page-hero{background:linear-gradient(135deg,#7f1d1d,#ef4444);border-radius:1rem;padding:1.75rem 2rem;color:white;margin-bottom:1.5rem;display:flex;justify-content:space-between;align-items:center;}
.page-hero h1{margin:0 0 0.3rem;font-size:1.5rem;font-weight:800;}
.page-hero p{margin:0;opacity:0.9;font-size:0.88rem;}

.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:1.5rem;}
.mini-stat{background:white;border-radius:0.9rem;padding:1.1rem 1.25rem;border:1px solid #e2e8f0;text-align:center;}
.mini-stat .num{font-size:1.8rem;font-weight:800;color:#1e293b;}
.mini-stat .lbl{font-size:0.75rem;color:#64748b;margin-top:2px;}

.filters-bar{display:flex;gap:0.85rem;margin-bottom:1.25rem;flex-wrap:wrap;}
.search-wrap{flex:1;min-width:220px;position:relative;}
.search-wrap i{position:absolute;left:1rem;top:50%;transform:translateY(-50%);color:#94a3b8;}
.search-input{width:100%;padding:0.7rem 1rem 0.7rem 2.75rem;border:1.5px solid #e2e8f0;border-radius:8px;font-size:0.88rem;font-family:inherit;background:white;box-sizing:border-box;}
.search-input:focus{outline:none;border-color:#10b981;}
.filter-sel{padding:0.7rem 1rem;border:1.5px solid #e2e8f0;border-radius:8px;font-size:0.88rem;background:white;cursor:pointer;font-family:inherit;}

.table-wrap{background:white;border-radius:1rem;border:1px solid #e2e8f0;overflow:hidden;}
.data-table{width:100%;border-collapse:collapse;}
.data-table th{background:#f8fafc;padding:0.85rem 1.25rem;text-align:left;font-size:0.75rem;color:#64748b;text-transform:uppercase;letter-spacing:0.4px;font-weight:700;border-bottom:2px solid #e2e8f0;}
.data-table td{padding:0.9rem 1.25rem;border-bottom:1px solid #f1f5f9;vertical-align:middle;}
.data-table tbody tr:hover{background:#f8fffe;}
.data-table tbody tr:last-child td{border-bottom:none;}
.data-table tbody tr.new-row{animation:highlightNew 3s ease-out;}
@keyframes highlightNew{0%{background:#fef3c7}100%{background:transparent}}

.status-select{padding:0.4rem 0.6rem;border:1.5px solid #e2e8f0;border-radius:6px;font-size:0.78rem;font-family:inherit;cursor:pointer;background:white;}
.status-select:focus{outline:none;border-color:#10b981;}
.action-link{display:inline-flex;align-items:center;gap:4px;padding:0.35rem 0.8rem;border-radius:6px;font-size:0.75rem;font-weight:700;text-decoration:none;border:1.5px solid #e2e8f0;color:#475569;transition:all 0.2s;}
.action-link:hover{border-color:#10b981;color:#10b981;}
.live-indicator{display:inline-flex;align-items:center;gap:6px;background:#d1fae5;color:#059669;padding:5px 12px;border-radius:99px;font-size:0.78rem;font-weight:700;}
</style>
</head>
<body>
<div class="admin-container">
  <aside class="admin-sidebar"></aside>
  <main class="admin-main">
    <header class="admin-top-bar"></header>
    <div class="content-wrapper">

      <div class="page-hero">
        <div>
          <h1><i class="fas fa-exclamation-circle"></i> Complaints Management</h1>
          <p>Real-time complaint tracking — new complaints appear automatically every 8 seconds.</p>
        </div>
        <div class="live-indicator"><span class="live-dot"></span>Live Sync Active</div>
      </div>

      <div class="stats-row">
        <div class="mini-stat"><div class="num" id="cTotal">–</div><div class="lbl">Total Complaints</div></div>
        <div class="mini-stat"><div class="num" style="color:#ef4444;" id="cPending">–</div><div class="lbl">Pending</div></div>
        <div class="mini-stat"><div class="num" style="color:#3b82f6;" id="cProgress">–</div><div class="lbl">In Progress</div></div>
        <div class="mini-stat"><div class="num" style="color:#10b981;" id="cResolved">–</div><div class="lbl">Resolved</div></div>
      </div>

      <div class="filters-bar">
        <div class="search-wrap"><i class="fas fa-search"></i><input type="text" class="search-input" id="searchInput" placeholder="Search complaints..."></div>
        <select class="filter-sel" id="statusFilter">
          <option value="all">All Status</option>
          <option value="pending">Pending</option>
          <option value="in_progress">In Progress</option>
          <option value="resolved">Resolved</option>
        </select>
        <select class="filter-sel" id="catFilter">
          <option value="all">All Categories</option>
          <option value="Overflowing Bin">Overflowing Bin</option>
          <option value="Missed Collection">Missed Collection</option>
          <option value="Illegal Dumping">Illegal Dumping</option>
          <option value="Road Litter">Road Litter</option>
          <option value="Damaged Dustbin">Damaged Dustbin</option>
        </select>
        <button class="btn btn-primary btn-sm" onclick="loadComplaints()"><i class="fas fa-sync"></i> Refresh</button>
      </div>

      <div class="table-wrap">
        <table class="data-table">
          <thead><tr><th>#</th><th>Citizen</th><th>Title</th><th>Category</th><th>Location</th><th>Date</th><th>Status</th><th>Actions</th></tr></thead>
          <tbody id="complaintsBody"><tr><td colspan="8" style="text-align:center;color:#94a3b8;padding:2rem;">Loading complaints...</td></tr></tbody>
        </table>
      </div>

    </div>
  </main>
</div>
<script src="../config.js"></script>
    <script src="../script.js"></script>
<script>
let allComplaints=[];

function renderComplaints(list){
  window.renderComplaints=renderComplaints;
  const q=document.getElementById('searchInput').value.toLowerCase();
  const st=document.getElementById('statusFilter').value;
  const cat=document.getElementById('catFilter').value;
  let items=[...list];
  if(st!=='all')items=items.filter(c=>c.status===st);
  if(cat!=='all')items=items.filter(c=>c.category===cat);
  if(q)items=items.filter(c=>(c.title+c.location+(c.user?.name||'')).toLowerCase().includes(q));

  document.getElementById('cTotal').textContent=list.length;
  document.getElementById('cPending').textContent=list.filter(c=>c.status==='pending').length;
  document.getElementById('cProgress').textContent=list.filter(c=>c.status==='in_progress').length;
  document.getElementById('cResolved').textContent=list.filter(c=>c.status==='resolved').length;

  const tbody=document.getElementById('complaintsBody');
  if(!items.length){tbody.innerHTML='<tr><td colspan="8" style="text-align:center;color:#94a3b8;padding:2rem;">No complaints found.</td></tr>';return;}
  tbody.innerHTML=items.map(c=>`
    <tr class="${c._isNew?'new-row':''}">
      <td style="font-weight:700;color:#64748b;">#${c.id}</td>
      <td><div style="font-weight:700;font-size:0.88rem;">${c.user?.name||'Anonymous'}</div><div style="font-size:0.75rem;color:#94a3b8;">${c.user?.email||'--'}</div></td>
      <td style="font-weight:600;max-width:180px;">${c.title}</td>
      <td><span class="badge badge-medium" style="white-space:nowrap;">${c.category||'General'}</span></td>
      <td style="font-size:0.82rem;color:#64748b;">📍 ${c.location}</td>
      <td style="font-size:0.78rem;color:#94a3b8;">${window.fmtDate(c.createdAt)}</td>
      <td>
        <select class="status-select" onchange="updateStatus(${c.id},this.value)">
          <option value="pending" ${c.status==='pending'?'selected':''}>Pending</option>
          <option value="in_progress" ${c.status==='in_progress'?'selected':''}>In Progress</option>
          <option value="resolved" ${c.status==='resolved'?'selected':''}>Resolved</option>
        </select>
      </td>
      <td><a href="complaint-update.html?id=${c.id}" class="action-link"><i class="fas fa-eye"></i> View</a></td>
    </tr>`).join('');
}

async function loadComplaints(){
  try{
    allComplaints=await window.API.getComplaints();
    renderComplaints(allComplaints);
  }catch(e){
    document.getElementById('complaintsBody').innerHTML='<tr><td colspan="8" style="text-align:center;color:#94a3b8;padding:2rem;">Connect backend to see live complaints.</td></tr>';
  }
}

async function updateStatus(id,status){
  try{
    await window.API.updateComplaintStatus(id,status);
    window.UI.notify(`Complaint #${id} marked as ${status}`,'success');
    loadComplaints();
  }catch(e){window.UI.notify('Status updated (demo mode).','info');}
}

document.getElementById('searchInput').addEventListener('input',()=>renderComplaints(allComplaints));
document.getElementById('statusFilter').addEventListener('change',()=>renderComplaints(allComplaints));
document.getElementById('catFilter').addEventListener('change',()=>renderComplaints(allComplaints));

document.addEventListener('DOMContentLoaded',()=>{
  loadComplaints();
  setInterval(loadComplaints,8000);
});
</script>
</body>
</html>
