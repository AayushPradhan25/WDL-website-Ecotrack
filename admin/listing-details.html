<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listing Details | Admin Panel | EcoSmart</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <style>
        /* --- CSS Variables (EcoSmart Theme) --- */
        
         :root {
            --primary-green: #2e7d5e;
            --primary-hover: #1b5e40;
            --bg-light: #f3f4f6;
            --sidebar-dark: #111827;
            --sidebar-hover: #1f2937;
            --text-dark: #1f2937;
            --text-muted: #6b7280;
            --white: #ffffff;
            --border-color: #e5e7eb;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --transition: all 0.3s ease;
        }
        /* --- Global Reset & Layout --- */
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, sans-serif;
        }
        
        body {
            background-color: var(--bg-light);
            color: var(--text-dark);
            overflow-x: hidden;
        }

        /* --- Sidebar --- */

        .sidebar-header {
            padding: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .sidebar-header h2 {
            font-size: 1.25rem;
            font-weight: 700;
        }
        
        .sidebar-header i {
            color: var(--primary-green);
            font-size: 1.5rem;
        }
        
        .sidebar-nav {
            padding: 1rem 0;
            flex-grow: 1;
        }
        
        .sidebar-nav a {
            display: flex;
            align-items: center;
            padding: 0.875rem 1.5rem;
            color: #d1d5db;
            text-decoration: none;
            font-size: 0.95rem;
            transition: var(--transition);
            border-left: 4px solid transparent;
        }
        
        .sidebar-nav a i {
            width: 24px;
            margin-right: 0.75rem;
            font-size: 1.1rem;
            text-align: center;
        }
        
        .sidebar-nav a:hover,
        .sidebar-nav a.active {
            background-color: var(--sidebar-hover);
            color: var(--white);
            border-left-color: var(--primary-green);
        }
        /* --- Main Content & Top Bar --- */

        .page-title {
            font-size: 1.5rem;
            font-weight: 600;
        }
        
        .logout-btn {
            background-color: transparent;
            color: #ef4444;
            border: 1px solid #ef4444;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
        }
        
        .logout-btn:hover {
            background-color: #ef4444;
            color: var(--white);
        }
        
        .content-wrapper {
            padding: 2rem;
            overflow-y: auto;
            max-width: 900px;
            /* Constrain width for better readability on details page */
        }
        /* --- Breadcrumb / Back Link --- */
        
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
            margin-bottom: 1.5rem;
            transition: var(--transition);
        }
        
        .back-link:hover {
            color: var(--primary-green);
        }
        /* --- Detail Card Styling --- */
        
        .card {
            background-color: var(--white);
            border-radius: 12px;
            box-shadow: var(--shadow-md);
            padding: 2.5rem;
            border: 1px solid var(--border-color);
        }
        
        .listing-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1.5rem;
            margin-bottom: 1.5rem;
        }
        
        .listing-title h2 {
            font-size: 1.8rem;
            color: var(--text-dark);
            margin-bottom: 0.5rem;
        }
        
        .listing-meta {
            display: flex;
            gap: 1.5rem;
            color: var(--text-muted);
            font-size: 0.95rem;
        }
        
        .listing-meta i {
            color: var(--primary-green);
            margin-right: 0.25rem;
        }
        
        .price-badge {
            background-color: #fef3c7;
            color: #b45309;
            padding: 0.5rem 1.25rem;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .listing-body h3 {
            font-size: 1.2rem;
            margin-bottom: 0.75rem;
            color: var(--text-dark);
        }
        
        .listing-body p {
            line-height: 1.7;
            color: var(--text-muted);
            margin-bottom: 2rem;
            font-size: 1.05rem;
        }
        /* --- Buttons --- */
        
        .btn-group {
            display: flex;
            gap: 1rem;
        }
        
        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1rem;
        }
        
        .btn-primary {
            background-color: var(--primary-green);
            color: var(--white);
        }
        
        .btn-primary:hover {
            background-color: var(--primary-hover);
        }
        
        .btn-danger-outline {
            background-color: transparent;
            color: #ef4444;
            border: 1px solid #ef4444;
        }
        
        .btn-danger-outline:hover {
            background-color: #ef4444;
            color: var(--white);
        }
        
        .error-state {
            text-align: center;
            padding: 3rem 0;
            color: var(--text-muted);
        }
        
        .error-state i {
            font-size: 3rem;
            color: #d1d5db;
            margin-bottom: 1rem;
        }
        /* Mobile */
        
        @media (max-width: 768px) {

            .listing-header {
                flex-direction: column;
                gap: 1rem;
            }
        }

        </style>
    <link rel="stylesheet" href="../style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
    <div class="admin-container">
        <!-- Sidebar -->
        <aside class="admin-sidebar"></aside>

        <!-- Main Content -->
        <main class="admin-main">
            <header class="admin-top-bar"></header>

            <div class="content-wrapper">
                <a href="listings.html" class="back-link">
                    <i class="fas fa-arrow-left"></i> Back to Marketplace
                </a>

                <div class="card" id="details">
                    <!-- Details will be injected here via JavaScript -->
                </div>
            </div>
        </main>
    </div>

    <script>
        // Utility: Extract Query Params
        function getQueryParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }

        // Action Handlers
        function adminLogout() {
            alert('Logging out of EcoSmart admin panel...');
        }

        function contactSeller(sellerName) {
            alert(`Opening contact module for seller: ${sellerName}`);
        }

        function removeListing() {
            if (confirm("Are you sure you want to remove this listing from the marketplace as an admin?")) {
                alert("Listing removed successfully.");
                window.location.href = "listings.html";
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            // Extended mock data array (includes descriptions)
            const mockListings = (window.mockData && window.mockData.listings) ? window.mockData.listings : [{
                id: 1,
                title: 'Bulk Cardboard Boxes',
                price: 150,
                seller: 'Green Retailers',
                weight: '50 kg',
                description: 'Clean, gently used corrugated cardboard boxes broken down and bundled. Perfect for recycling centers or businesses needing packaging materials.'
            }, {
                id: 2,
                title: 'Scrap Aluminum Cans',
                price: 300,
                seller: 'John Doe',
                weight: '15 kg',
                description: 'Crushed aluminum beverage cans collected over the past month. Completely rinsed and bagged securely.'
            }, {
                id: 3,
                title: 'Organic Compost',
                price: 80,
                seller: 'Eco Farms',
                weight: '100 kg',
                description: 'Rich, dark organic compost made from agricultural and food waste. Highly nutritious for soil amendment.'
            }, {
                id: 4,
                title: 'Used Electronics',
                price: 500,
                seller: 'TechRecycle',
                weight: '25 kg',
                description: 'Assorted e-waste including old motherboards, broken laptops, and tangled cables. Great yield for precious metal recovery.'
            }];

            const detailsContainer = document.getElementById('details');
            const id = getQueryParam('id');

            // For demo purposes, default to ID 1 if no URL parameter is provided
            const targetId = id ? parseInt(id) : 1;
            const item = mockListings.find(l => l.id === targetId);

            if (item) {
                detailsContainer.innerHTML = `
                    <div class="listing-header">
                        <div class="listing-title">
                            <h2>${item.title}</h2>
                            <div class="listing-meta">
                                <span><i class="fas fa-store"></i> ${item.seller}</span>
                                <span><i class="fas fa-weight-hanging"></i> ${item.weight || 'Weight N/A'}</span>
                                <span><i class="fas fa-hashtag"></i> ID: #${item.id}</span>
                            </div>
                        </div>
                        <div class="price-badge">
                            <i class="fas fa-coins"></i> ${item.price} coins
                        </div>
                    </div>
                    
                    <div class="listing-body">
                        <h3>Description</h3>
                        <p>${item.description || 'No description provided by the seller.'}</p>
                        
                        <div class="btn-group">
                            <button class="btn btn-primary" onclick="contactSeller('${item.seller}')">
                                <i class="fas fa-envelope"></i> Contact Seller
                            </button>
                            <button class="btn btn-danger-outline" onclick="removeListing()">
                                <i class="fas fa-trash"></i> Remove Listing
                            </button>
                        </div>
                    </div>
                `;
            } else {
                // Error state if ID is not found
                detailsContainer.innerHTML = `
                    <div class="error-state">
                        <i class="fas fa-box-open"></i>
                        <h2>Listing Not Found</h2>
                        <p>The marketplace listing you are looking for does not exist or has been removed.</p>
                    </div>
                `;
            }
        });
    </script>
<script src="../config.js"></script>
    <script src="../script.js"></script>
</body>

</html>
