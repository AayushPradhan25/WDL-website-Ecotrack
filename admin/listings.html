<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waste Listings | Admin Panel | EcoSmart</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <style>
        /* --- CSS Variables (EcoSmart Theme) --- */
        
         :root {
            --primary-green: #2e7d5e;
            --bg-light: #f3f4f6;
            --sidebar-dark: #111827;
            --sidebar-hover: #1f2937;
            --text-dark: #1f2937;
            --text-muted: #6b7280;
            --white: #ffffff;
            --border-color: #e5e7eb;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --transition: all 0.3s ease;
        }
        /* --- Global Reset & Layout --- */
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, sans-serif;
        }
        
        body {
            background-color: var(--bg-light);
            color: var(--text-dark);
            overflow-x: hidden;
        }

        /* --- Sidebar --- */

        .sidebar-header {
            padding: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .sidebar-header h2 {
            font-size: 1.25rem;
            font-weight: 700;
        }
        
        .sidebar-header i {
            color: var(--primary-green);
            font-size: 1.5rem;
        }
        
        .sidebar-nav {
            padding: 1rem 0;
            flex-grow: 1;
        }
        
        .sidebar-nav a {
            display: flex;
            align-items: center;
            padding: 0.875rem 1.5rem;
            color: #d1d5db;
            text-decoration: none;
            font-size: 0.95rem;
            transition: var(--transition);
            border-left: 4px solid transparent;
        }
        
        .sidebar-nav a i {
            width: 24px;
            margin-right: 0.75rem;
            font-size: 1.1rem;
            text-align: center;
        }
        
        .sidebar-nav a:hover,
        .sidebar-nav a.active {
            background-color: var(--sidebar-hover);
            color: var(--white);
            border-left-color: var(--primary-green);
        }
        /* --- Main Content & Top Bar --- */

        .page-title {
            font-size: 1.5rem;
            font-weight: 600;
        }
        
        .logout-btn {
            background-color: transparent;
            color: #ef4444;
            border: 1px solid #ef4444;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
        }
        
        .logout-btn:hover {
            background-color: #ef4444;
            color: var(--white);
        }
        
        .content-wrapper {
            padding: 2rem;
            overflow-y: auto;
        }
        /* --- Controls & Search --- */
        
        .controls-container {
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .search-box {
            position: relative;
            width: 100%;
            max-width: 350px;
        }
        
        .search-box i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }
        
        .search-box input {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.5rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 0.95rem;
            outline: none;
            transition: var(--transition);
            background-color: var(--white);
            box-shadow: var(--shadow-sm);
        }
        
        .search-box input:focus {
            border-color: var(--primary-green);
            box-shadow: 0 0 0 3px rgba(46, 125, 94, 0.15);
        }
        /* --- Listings Grid & Cards --- */
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }
        
        .stat-card {
            background-color: var(--white);
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-color);
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        
        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-md);
        }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        
        .stat-card h3 {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 0.25rem;
        }
        
        .price-badge {
            background-color: #fef3c7;
            color: #b45309;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.85rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }
        
        .card-details {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            font-size: 0.9rem;
            color: var(--text-muted);
        }
        
        .card-details p {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .card-details i {
            color: var(--primary-green);
            width: 16px;
        }
        
        .btn-primary {
            display: inline-block;
            width: 100%;
            text-align: center;
            background-color: #eff6ff;
            color: #3b82f6;
            border: 1px solid #bfdbfe;
            padding: 0.6rem;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: var(--transition);
            margin-top: auto;
        }
        
        .btn-primary:hover {
            background-color: #3b82f6;
            color: var(--white);
        }
        /* --- Empty State --- */
        
        .empty-state {
            grid-column: 1 / -1;
            padding: 4rem 2rem;
            text-align: center;
            background-color: var(--white);
            border-radius: 12px;
            border: 1px dashed var(--border-color);
            color: var(--text-muted);
        }
        /* Mobile */
        
        @media (max-width: 768px) {

        }

        </style>
    <link rel="stylesheet" href="../style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
    <div class="admin-container">
        <aside class="admin-sidebar"></aside>

        <main class="admin-main">
            <header class="admin-top-bar"></header>

            <div class="content-wrapper">
                <div class="controls-container">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="searchListings" placeholder="Search listings by title or seller...">
                    </div>
                </div>

                <div class="stats-grid" id="listingsGrid">
                    <!-- Cards will be injected here via JavaScript -->
                </div>
            </div>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Mock data fallback if window.mockData is not present
            const allListings = (window.mockData && window.mockData.listings) ? window.mockData.listings : [{
                id: 1,
                title: 'Bulk Cardboard Boxes',
                price: 150,
                seller: 'Green Retailers',
                weight: '50 kg'
            }, {
                id: 2,
                title: 'Scrap Aluminum Cans',
                price: 300,
                seller: 'John Doe',
                weight: '15 kg'
            }, {
                id: 3,
                title: 'Organic Compost',
                price: 80,
                seller: 'Eco Farms',
                weight: '100 kg'
            }, {
                id: 4,
                title: 'Used Electronics',
                price: 500,
                seller: 'TechRecycle',
                weight: '25 kg'
            }];

            const grid = document.getElementById('listingsGrid');
            const searchInput = document.getElementById('searchListings');

            // Function to render the grid
            const renderGrid = (listingsToRender) => {
                // Empty State Handle
                if (listingsToRender.length === 0) {
                    grid.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-box-open fa-3x" style="margin-bottom: 1rem; color: #d1d5db;"></i>
                            <h3>No listings found</h3>
                            <p style="margin-top: 0.5rem;">Try adjusting your search terms.</p>
                        </div>`;
                    return;
                }

                grid.innerHTML = listingsToRender.map(l => `
                    <div class="stat-card">
                        <div class="card-header">
                            <h3>${l.title}</h3>
                        </div>
                        <div class="card-details">
                            <span class="price-badge"><i class="fas fa-coins"></i> ${l.price} coins</span>
                            <p><i class="fas fa-user-tag"></i> Seller: ${l.seller}</p>
                            <p><i class="fas fa-weight-hanging"></i> Qty: ${l.weight || 'N/A'}</p>
                        </div>
                        <a href="listing-details.html?id=${l.id}" class="btn-primary">View Details</a>
                    </div>
                `).join('');
            };

            // Initial Render
            renderGrid(allListings);

            // Real-time Search Filter
            searchInput.addEventListener('input', (e) => {
                const searchTerm = e.target.value.toLowerCase();
                const filteredListings = allListings.filter(l =>
                    l.title.toLowerCase().includes(searchTerm) ||
                    l.seller.toLowerCase().includes(searchTerm)
                );
                renderGrid(filteredListings);
            });
        });

        function adminLogout() {
            alert('Logging out of EcoSmart admin panel...');
        }
    </script>
<script src="../config.js"></script>
    <script src="../script.js"></script>
</body>

</html>
