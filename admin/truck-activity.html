<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Truck Activity Logs | Admin Panel | Eco Smart</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../style.css">

    <style>
        /* --- CSS Variables --- */
        
         :root {
            --primary-green: #2e7d5e;
            --bg-light: #f3f4f6;
            --sidebar-dark: #111827;
            --sidebar-hover: #1f2937;
            --text-dark: #1f2937;
            --text-muted: #6b7280;
            --white: #ffffff;
            --border-color: #e5e7eb;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --transition: all 0.3s ease;
        }
        /* --- Global Reset & Layout --- */
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, sans-serif;
        }
        
        body {
            background-color: var(--bg-light);
            color: var(--text-dark);
            overflow-x: hidden;
        }

        /* --- Sidebar --- */

        .sidebar-header {
            padding: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .sidebar-header h2 {
            font-size: 1.25rem;
            font-weight: 700;
        }
        
        .sidebar-header i {
            color: var(--primary-green);
            font-size: 1.5rem;
        }
        
        .sidebar-nav {
            padding: 1rem 0;
            flex-grow: 1;
        }
        
        .sidebar-nav a {
            display: flex;
            align-items: center;
            padding: 0.875rem 1.5rem;
            color: #d1d5db;
            text-decoration: none;
            font-size: 0.95rem;
            transition: var(--transition);
            border-left: 4px solid transparent;
        }
        
        .sidebar-nav a i {
            width: 24px;
            margin-right: 0.75rem;
            font-size: 1.1rem;
            text-align: center;
        }
        
        .sidebar-nav a:hover,
        .sidebar-nav a.active {
            background-color: var(--sidebar-hover);
            color: var(--white);
            border-left-color: var(--primary-green);
        }
        /* --- Main Content & Top Bar --- */

        .page-title {
            font-size: 1.5rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .logout-btn {
            background-color: transparent;
            color: #ef4444;
            border: 1px solid #ef4444;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
        }
        
        .logout-btn:hover {
            background-color: #ef4444;
            color: var(--white);
        }
        
        .content-wrapper {
            padding: 2rem;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }
        /* --- Buttons --- */
        
        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
            transition: var(--transition);
            margin-bottom: 1.5rem;
        }
        
        .btn-back:hover {
            color: var(--primary-green);
        }
        /* --- Cards & Context Banner --- */
        
        .card {
            background-color: var(--white);
            border-radius: 12px;
            box-shadow: var(--shadow-md);
            padding: 2.5rem;
            margin-bottom: 1.5rem;
        }
        
        .context-info {
            background-color: #f8fafc;
            padding: 1.5rem;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            margin-bottom: 2.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
        }
        
        .context-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .context-icon {
            width: 48px;
            height: 48px;
            background-color: #e0f2fe;
            color: #0284c7;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            flex-shrink: 0;
        }
        
        .context-text h3 {
            font-size: 1.1rem;
            margin-bottom: 0.25rem;
            color: var(--text-dark);
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        
        .context-text p {
            font-size: 0.9rem;
            color: var(--text-muted);
        }
        
        .license-plate {
            font-family: 'Courier New', Courier, monospace;
            font-weight: 700;
            background-color: #f1f5f9;
            border: 1px solid #cbd5e1;
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            display: inline-block;
            letter-spacing: 1px;
            color: #334155;
        }
        /* --- Timeline Styling --- */
        
        .timeline-header {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .timeline-header i {
            color: var(--primary-green);
        }
        
        .timeline {
            position: relative;
            border-left: 2px solid #e2e8f0;
            margin-left: 1rem;
            padding-left: 2rem;
            list-style: none;
        }
        
        .timeline-item {
            position: relative;
            margin-bottom: 1.5rem;
        }
        
        .timeline-item:last-child {
            margin-bottom: 0;
        }
        
        .timeline-marker {
            position: absolute;
            left: -2.6rem;
            top: 0;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background-color: var(--primary-green);
            border: 4px solid var(--white);
            box-shadow: 0 0 0 1px #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1;
        }
        
        .timeline-content {
            background-color: #f8fafc;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1rem 1.25rem;
            color: var(--text-dark);
            font-size: 0.95rem;
            line-height: 1.5;
            transition: var(--transition);
        }
        
        .timeline-content:hover {
            border-color: #cbd5e1;
            box-shadow: var(--shadow-sm);
        }
        /* --- Empty / Error States --- */
        
        .empty-state,
        .error-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-muted);
        }
        
        .empty-state i {
            font-size: 3rem;
            color: #cbd5e1;
            margin-bottom: 1rem;
        }
        
        .empty-state h3 {
            font-size: 1.1rem;
            color: var(--text-dark);
            margin-bottom: 0.5rem;
        }
        
        .error-state i {
            font-size: 3rem;
            color: #fca5a5;
            margin-bottom: 1rem;
        }
        
        .error-state h3 {
            font-size: 1.25rem;
            color: var(--text-dark);
            margin-bottom: 0.5rem;
        }

        </style>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
    <div class="admin-container">
        <aside class="admin-sidebar"></aside>

        <main class="admin-main">
            <header class="admin-top-bar"></header>

            <div class="content-wrapper">
                <a href="trucks.html" class="btn-back"><i class="fas fa-arrow-left"></i> Back to Fleet</a>

                <div id="logsContainer">
                </div>
            </div>
        </main>
    </div>

    <script src="../config.js"></script>
    <script src="../script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');
            const container = document.getElementById('logsContainer');

            // Safely fetch truck
            const allTrucks = (window.mockData && window.mockData.trucks) ? window.mockData.trucks : [];
            const truck = allTrucks.find(t => t.id == id);

            if (truck) {
                // Determine Driver text
                const driverText = truck.driver ? truck.driver : '<span style="font-style: italic;">Unassigned</span>';

                // Build Timeline HTML
                const logs = truck.logs || [];
                let timelineHtml = '';

                if (logs.length > 0) {
                    timelineHtml = `<ul class="timeline">`;
                    logs.forEach(log => {
                        timelineHtml += `
                            <li class="timeline-item">
                                <div class="timeline-marker"></div>
                                <div class="timeline-content">
                                    ${log}
                                </div>
                            </li>
                        `;
                    });
                    timelineHtml += `</ul>`;
                } else {
                    timelineHtml = `
                        <div class="empty-state">
                            <i class="fas fa-history"></i>
                            <h3>No Activity Recorded</h3>
                            <p>There are currently no logs available for this vehicle.</p>
                        </div>
                    `;
                }

                // Render whole card
                container.innerHTML = `
                    <div class="card">
                        <div class="context-info">
                            <div class="context-left">
                                <div class="context-icon"><i class="fas fa-truck-moving"></i></div>
                                <div class="context-text">
                                    <h3>Vehicle <span class="license-plate">${truck.number}</span></h3>
                                    <p>Vehicle ID #${truck.id}</p>
                                </div>
                            </div>
                            <div class="context-right" style="text-align: right;">
                                <p style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.25rem;">Assigned Driver</p>
                                <p style="font-weight: 600; color: var(--text-dark);"><i class="fas fa-user-circle" style="color: #94a3b8; margin-right: 4px;"></i> ${driverText}</p>
                            </div>
                        </div>

                        <h2 class="timeline-header"><i class="fas fa-list-ul"></i> Action History</h2>
                        ${timelineHtml}
                    </div>
                `;
            } else {
                // Truck not found
                container.innerHTML = `
                    <div class="card error-state">
                        <i class="fas fa-exclamation-triangle"></i>
                        <h3>Vehicle Not Found</h3>
                        <p>We couldn't locate the activity logs for the requested truck.</p>
                    </div>
                `;
            }
        });
    </script>
</body>

</html>
