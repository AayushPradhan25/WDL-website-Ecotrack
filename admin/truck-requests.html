<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Truck Requests | EcoSmart Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <style>

        .content-wrapper {
            padding: 1.75rem 2rem;
            flex: 1;
            overflow-y: auto;
        }
        
        .page-hero {
            background: linear-gradient(135deg, #064e3b, #10b981);
            border-radius: 1rem;
            padding: 1.75rem 2rem;
            color: white;
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .page-hero h1 {
            margin: 0 0 0.3rem;
            font-size: 1.6rem;
            font-weight: 800;
        }
        
        .page-hero p {
            margin: 0;
            opacity: 0.9;
            font-size: 0.9rem;
        }
        
        .filter-row {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }
        
        .filter-btn {
            padding: 0.5rem 1rem;
            border: 1px solid #e2e8f0;
            border-radius: 0.5rem;
            background: white;
            color: #475569;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .filter-btn.active {
            background: #10b981;
            color: white;
            border-color: #10b981;
        }
        
        .filter-btn:hover {
            border-color: #10b981;
        }
        
        .table-wrapper {
            background: white;
            border-radius: 1rem;
            border: 1px solid #e2e8f0;
            overflow: hidden;
        }
        
        .data-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .data-table thead {
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
        }
        
        .data-table th {
            padding: 1rem;
            text-align: left;
            font-weight: 700;
            color: #64748b;
            font-size: 0.85rem;
            text-transform: uppercase;
        }
        
        .data-table td {
            padding: 1rem;
            border-bottom: 1px solid #f1f5f9;
            color: #334155;
        }
        
        .data-table tbody tr:hover {
            background: #f8fdf4;
        }
        
        .status-badge {
            display: inline-block;
            padding: 0.3rem 0.8rem;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
        }
        
        .badge-pending {
            background: #fef3c7;
            color: #78350f;
        }
        
        .badge-approved {
            background: #d1fae5;
            color: #065f46;
        }
        
        .badge-rejected {
            background: #fee2e2;
            color: #991b1b;
        }
        
        .btn {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 0.5rem;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        
        .btn-sm {
            padding: 0.4rem 0.8rem;
            font-size: 0.8rem;
        }
        
        .btn-success {
            background: #10b981;
            color: white;
        }
        
        .btn-success:hover {
            background: #059669;
        }
        
        .btn-danger {
            background: #ef4444;
            color: white;
        }
        
        .btn-danger:hover {
            background: #dc2626;
        }
        
        .btn-secondary {
            background: #e2e8f0;
            color: #475569;
        }
        
        .btn-secondary:hover {
            background: #cbd5e1;
        }
        
        .request-detail {
            padding: 1.5rem;
            background: white;
            border-radius: 1rem;
            border: 1px solid #e2e8f0;
            margin-bottom: 1.5rem;
        }
        
        .request-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #e2e8f0;
        }
        
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: #94a3b8;
        }
        
        .empty-state i {
            font-size: 3rem;
            margin-bottom: 1rem;
            display: block;
            opacity: 0.3;
        }
        
        @media(max-width:768px) {
            .filter-row {
                flex-direction: column;
            }
            .table-wrapper {
                overflow-x: auto;
            }
        }
    </style>
</head>

<body>
    <div class="admin-container">
        <aside class="admin-sidebar"></aside>
        <main class="admin-main">
            <header class="admin-top-bar"></header>
            <div class="content-wrapper">

                <div class="page-hero">
                    <div>
                        <h1><i class="fas fa-truck-loading"></i> Truck Requests</h1>
                        <p>Review and approve citizen requests for special waste collection</p>
                    </div>
                    <div style="text-align:right;font-size:0.9rem;opacity:0.9;">
                        <i class="fas fa-clock"></i> <span id="requestCount">0</span> pending
                    </div>
                </div>

                <div class="filter-row">
                    <button class="filter-btn active" onclick="filterRequests('all', this)">
          <i class="fas fa-list"></i> All Requests
        </button>
                    <button class="filter-btn" onclick="filterRequests('pending', this)">
          <i class="fas fa-hourglass-half"></i> Pending
        </button>
                    <button class="filter-btn" onclick="filterRequests('approved', this)">
          <i class="fas fa-check-circle"></i> Approved
        </button>
                    <button class="filter-btn" onclick="filterRequests('rejected', this)">
          <i class="fas fa-times-circle"></i> Rejected
        </button>
                </div>

                <div id="requestsContainer">
                    <div class="empty-state">
                        <i class="fas fa-spinner fa-spin"></i>
                        <p>Loading truck requests...</p>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <script src="../config.js"></script>
    <script src="../script.js"></script>
    <script>
        let allRequests = [];
        let currentFilter = 'all';

        document.addEventListener('DOMContentLoaded', async() => {
            await loadRequests();
        });

        async function loadRequests() {
            try {
                allRequests = await window.API.getAllTruckRequests() || [];
                renderRequests();
                updateRequestCount();
            } catch (err) {
                console.error("Failed to load truck requests:", err);
                document.getElementById('requestsContainer').innerHTML = `
            <div class="empty-state">
                <i class="fas fa-exclamation-circle"></i>
                <p>Error loading requests. Please try again.</p>
            </div>
        `;
            }
        }

        function updateRequestCount() {
            const pending = allRequests.filter(r => r.status === 'pending').length;
            document.getElementById('requestCount').textContent = pending;
        }

        async function filterRequests(status, btn) {
            currentFilter = status;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderRequests();
        }

        function renderRequests() {
            const container = document.getElementById('requestsContainer');
            let filtered = allRequests;
            if (currentFilter !== 'all') {
                filtered = allRequests.filter(r => r.status === currentFilter);
            }

            if (filtered.length === 0) {
                container.innerHTML = `
            <div class="empty-state">
                <i class="fas fa-inbox"></i>
                <p>No ${currentFilter !== 'all' ? currentFilter : ''} requests found</p>
            </div>
        `;
                return;
            }

            container.innerHTML = filtered.map(req => `
        <div class="request-detail">
            <div class="request-header">
                <div>
                    <h3 style="margin:0 0 0.5rem;font-size:1.1rem;">Request #${req.id}</h3>
                    <p style="margin:0;color:#64748b;font-size:0.85rem;">
                        <i class="fas fa-user"></i> ${req.userName || 'User'} 
                        <span style="margin-left:1rem;"><i class="fas fa-phone"></i> ${req.userPhone || '--'}</span>
                    </p>
                </div>
                <span class="status-badge badge-${req.status}">${req.status.toUpperCase()}</span>
            </div>

            <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;margin-bottom:1.5rem;">
                <div>
                    <label style="font-size:0.75rem;font-weight:700;text-transform:uppercase;color:#64748b;">Location</label>
                    <p style="margin:0.3rem 0 0;font-weight:600;color:#334155;">📍 ${req.location || '--'}</p>
                </div>
                <div>
                    <label style="font-size:0.75rem;font-weight:700;text-transform:uppercase;color:#64748b;">Requested Date</label>
                    <p style="margin:0.3rem 0 0;font-weight:600;color:#334155;">📅 ${new Date(req.requestedDate).toLocaleDateString('en-IN')}</p>
                </div>
                <div>
                    <label style="font-size:0.75rem;font-weight:700;text-transform:uppercase;color:#64748b;">Waste Type</label>
                    <p style="margin:0.3rem 0 0;font-weight:600;color:#334155;">🗑️ ${req.wasteType || 'General'}</p>
                </div>
                <div>
                    <label style="font-size:0.75rem;font-weight:700;text-transform:uppercase;color:#64748b;">Quantity</label>
                    <p style="margin:0.3rem 0 0;font-weight:600;color:#334155;">📦 ${req.quantity || '--'}</p>
                </div>
            </div>

            <div style="margin-bottom:1.5rem;">
                <label style="font-size:0.75rem;font-weight:700;text-transform:uppercase;color:#64748b;">Description</label>
                <p style="margin:0.3rem 0 0;color:#475569;line-height:1.5;">${req.description || 'No description provided'}</p>
            </div>

            ${req.status === 'pending' ? `
                <div style="display:flex;gap:1rem;">
                    <button class="btn btn-success btn-sm" onclick="approveRequest(${req.id})">
                        <i class="fas fa-check"></i> Approve
                    </button>
                    <button class="btn btn-danger btn-sm" onclick="rejectRequest(${req.id})">
                        <i class="fas fa-times"></i> Reject
                    </button>
                </div>
            ` : ''}
        </div>
    `).join('');
}

async function approveRequest(id) {
    if (!window.UI.confirm('Approve this truck request?')) return;
    try {
        await window.API.updateTruckRequest(id, { status: 'approved' });
        window.UI.notify('Request approved! ✅', 'success');
        await loadRequests();
    } catch (err) {
        window.UI.notify('Failed to approve request', 'error');
    }
}

async function rejectRequest(id) {
    if (!window.UI.confirm('Reject this truck request?')) return;
    try {
        await window.API.updateTruckRequest(id, { status: 'rejected' });
        window.UI.notify('Request rejected', 'info');
        await loadRequests();
    } catch (err) {
        window.UI.notify('Failed to reject request', 'error');
    }
}
    </script>
</body>

</html>
