<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fleet Tracking | EcoSmart Admin</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- Leaflet Maps CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
         :root {
            --primary: #10b981;
            --bg: #f8fafc;
            --sidebar-dark: #0f172a;
        }
        
        .content-wrapper {
            padding: 0;
            height: calc(100vh - 70px);
            position: relative;
        }
        
        #adminMap {
            height: 100%;
            width: 100%;
            z-index: 1;
        }
        
        .fleet-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 300px;
            background: white;
            padding: 1.5rem;
            border-radius: 1.5rem;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            z-index: 1000;
            max-height: 80%;
            overflow-y: auto;
        }
        
        .truck-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid #f1f5f9;
            cursor: pointer;
            transition: 0.2s;
        }
        
        .truck-item:hover {
            background: #f8fafc;
        }
        
        .truck-status {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }
    </style>
    <link rel="stylesheet" href="../style.css">
</head>

<body>
    <div class="admin-container">
        <aside class="admin-sidebar"></aside>

        <main class="admin-main">
            <header class="admin-top-bar"></header>

            <div class="content-wrapper">
                <div class="fleet-overlay">
                    <h3 style="margin-bottom: 1rem; font-weight: 800;">Active Fleet</h3>
                    <div id="fleetList">
                        <p style="color: #64748b;">Scanning for trucks...</p>
                    </div>
                </div>
                <div id="adminMap"></div>
            </div>
        </main>
    </div>

    <!-- Leaflet Maps JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="../config.js"></script>
    <script src="../script.js"></script>
    <script>
        let map;
        document.addEventListener('DOMContentLoaded', async() => {
            const fleetList = document.getElementById('fleetList');

            try {
                map = window.MAP.init('adminMap');
                const trucks = await window.API.getTrucks();

                if (trucks.length === 0) {
                    fleetList.innerHTML = '<p>No trucks registered.</p>';
                } else {
                    fleetList.innerHTML = trucks.map((t, idx) => `
                        <div class="truck-item" onclick="focusTruck(${idx})">
                            <i class="fas fa-truck" style="color: #10b981;"></i>
                            <div style="flex: 1;">
                                <div style="font-weight: 700; font-size: 0.9rem;">${t.number}</div>
                                <div style="font-size: 0.75rem; color: #64748b;">Driver: ${t.driverName}</div>
                            </div>
                            <div class="truck-status" style="background: ${t.status === 'active' ? '#10b981' : '#f59e0b'};"></div>
                        </div>
                    `).join('');

                    window.adminTruckMarkers = trucks.map((t) => {
                        const coords = [t.latitude || MAP_DEFAULT[0], t.longitude || MAP_DEFAULT[1]];
                        const marker = window.MAP.addMarker(map, coords, `<b>${t.number}</b><br>Driver: ${t.driverName || '--'}<br>Status: ${t.status}`, 'truck');
                        return {
                            coords,
                            marker,
                            truck: t
                        };
                    });
                }

            } catch (err) {
                console.error("Fleet map error:", err);
            }
        });

        function focusTruck(idx) {
            const target = window.adminTruckMarkers ? .[idx];
            if (target ? .marker && target.coords) {
                map ? .setView(target.coords, 14);
                target.marker.setZIndexOffset(1000);
                window.UI.notify(`Focused on truck ${target.truck.number}`, 'success');
            } else {
                window.UI.notify('Truck location unavailable.', 'warning');
            }
        }
    </script>
</body>

</html>
