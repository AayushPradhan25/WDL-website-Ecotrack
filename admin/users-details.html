<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Details | Admin Panel | Eco Smart</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../style.css">

    <style>
        /* --- CSS Variables --- */
        
         :root {
            --primary-green: #2e7d5e;
            --bg-light: #f3f4f6;
            --sidebar-dark: #111827;
            --sidebar-hover: #1f2937;
            --text-dark: #1f2937;
            --text-muted: #6b7280;
            --white: #ffffff;
            --border-color: #e5e7eb;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --transition: all 0.3s ease;
        }
        /* --- Global Reset & Layout --- */
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, sans-serif;
        }
        
        body {
            background-color: var(--bg-light);
            color: var(--text-dark);
            overflow-x: hidden;
        }

        /* --- Sidebar --- */

        .sidebar-header {
            padding: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .sidebar-header h2 {
            font-size: 1.25rem;
            font-weight: 700;
        }
        
        .sidebar-header i {
            color: var(--primary-green);
            font-size: 1.5rem;
        }
        
        .sidebar-nav {
            padding: 1rem 0;
            flex-grow: 1;
        }
        
        .sidebar-nav a {
            display: flex;
            align-items: center;
            padding: 0.875rem 1.5rem;
            color: #d1d5db;
            text-decoration: none;
            font-size: 0.95rem;
            transition: var(--transition);
            border-left: 4px solid transparent;
        }
        
        .sidebar-nav a i {
            width: 24px;
            margin-right: 0.75rem;
            font-size: 1.1rem;
            text-align: center;
        }
        
        .sidebar-nav a:hover,
        .sidebar-nav a.active {
            background-color: var(--sidebar-hover);
            color: var(--white);
            border-left-color: var(--primary-green);
        }
        /* --- Main Content & Top Bar --- */

        .page-title {
            font-size: 1.5rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .logout-btn {
            background-color: transparent;
            color: #ef4444;
            border: 1px solid #ef4444;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
        }
        
        .logout-btn:hover {
            background-color: #ef4444;
            color: var(--white);
        }
        
        .content-wrapper {
            padding: 2rem;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }
        /* --- Buttons --- */
        
        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
            transition: var(--transition);
            margin-bottom: 1.5rem;
        }
        
        .btn-back:hover {
            color: var(--primary-green);
        }
        
        .btn {
            padding: 0.6rem 1.2rem;
            border-radius: 6px;
            font-weight: 500;
            text-decoration: none;
            cursor: pointer;
            border: none;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .btn-danger {
            background-color: #fef2f2;
            color: #ef4444;
            border: 1px solid #fecaca;
        }
        
        .btn-danger:hover {
            background-color: #ef4444;
            color: white;
        }
        /* --- Profile Card --- */
        
        .profile-card {
            background-color: var(--white);
            border-radius: 12px;
            box-shadow: var(--shadow-md);
            overflow: hidden;
        }
        
        .profile-header {
            background: linear-gradient(135deg, var(--primary-green) 0%, #1a533d 100%);
            padding: 3rem 2rem;
            text-align: center;
            position: relative;
        }
        
        .profile-avatar {
            width: 100px;
            height: 100px;
            background-color: var(--white);
            border-radius: 50%;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            font-size: 3rem;
            color: var(--primary-green);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            border: 4px solid var(--bg-light);
            margin-bottom: 1rem;
        }
        
        .profile-header h2 {
            color: var(--white);
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }
        
        .profile-header p {
            color: #d1fae5;
            font-size: 0.95rem;
        }
        
        .profile-body {
            padding: 2rem;
        }
        
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .info-group {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }
        
        .info-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            font-weight: 600;
        }
        
        .info-value {
            font-size: 1rem;
            color: var(--text-dark);
            font-weight: 500;
        }
        /* --- Badges --- */
        
        .badge {
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: capitalize;
            display: inline-block;
        }
        
        .badge-success {
            background-color: #d1fae5;
            color: #065f46;
        }
        
        .badge-danger {
            background-color: #fee2e2;
            color: #991b1b;
        }
        /* --- Empty/Error State --- */
        
        .error-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-muted);
        }
        
        .error-state i {
            font-size: 4rem;
            color: #d1d5db;
            margin-bottom: 1rem;
        }
        
        .error-state h3 {
            font-size: 1.25rem;
            color: var(--text-dark);
            margin-bottom: 0.5rem;
        }

        </style>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
    <div class="admin-container">
        <aside class="admin-sidebar"></aside>

        <main class="admin-main">
            <header class="admin-top-bar"></header>

            <div class="content-wrapper">
                <a href="users.html" class="btn-back"><i class="fas fa-arrow-left"></i> Back to All Users</a>

                <div id="userProfileContainer">
                </div>
            </div>
        </main>
    </div>

    <script src="../config.js"></script>
    <script src="../script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Native, robust way to get URL parameters without relying on external functions
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');
            const container = document.getElementById('userProfileContainer');

            // Safely retrieve user data
            const allUsers = (window.mockData && window.mockData.users) ? window.mockData.users : [];
            const user = allUsers.find(u => u.id == id);

            if (user) {
                const badgeClass = user.status.toLowerCase() === 'active' ? 'badge-success' : 'badge-danger';

                // Using UI Avatars for a dynamic profile picture based on the user's name
                const avatarUrl = `https://ui-avatars.com/api/?name=${encodeURIComponent(user.name)}&background=2e7d5e&color=fff&size=128`;

                container.innerHTML = `
                    <div class="profile-card">
                        <div class="profile-header">
                            <img src="${avatarUrl}" alt="${user.name}" class="profile-avatar">
                            <h2>${user.name}</h2>
                            <p>User ID: #${user.id}</p>
                        </div>
                        <div class="profile-body">
                            <div class="info-grid">
                                <div class="info-group">
                                    <span class="info-label">Email Address</span>
                                    <span class="info-value">${user.email}</span>
                                </div>
                                <div class="info-group">
                                    <span class="info-label">Account Status</span>
                                    <span class="info-value"><span class="badge ${badgeClass}">${user.status}</span></span>
                                </div>
                                <div class="info-group">
                                    <span class="info-label">Date Joined</span>
                                    <span class="info-value">${user.joined || 'N/A'}</span>
                                </div>
                            </div>
                            
                            <hr style="border: 0; border-top: 1px solid var(--border-color); margin: 2rem 0;">
                            
                            <div style="display: flex; gap: 1rem; justify-content: flex-end;">
                                <a href="user-status.html?id=${user.id}" class="btn btn-danger">
                                    <i class="fas fa-ban"></i> Manage Access
                                </a>
                            </div>
                        </div>
                    </div>
                `;
            } else {
                // Beautiful error state if user isn't found
                container.innerHTML = `
                    <div class="profile-card error-state">
                        <i class="fas fa-user-times"></i>
                        <h3>User Not Found</h3>
                        <p>We couldn't locate the user you're looking for. They may have been deleted.</p>
                    </div>
                `;
            }
        });
    </script>
</body>

</html>
