<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users | Admin Panel | Eco Smart</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../style.css">

    <style>
        /* --- CSS Variables --- */
        
         :root {
            --primary-green: #2e7d5e;
            --bg-light: #f3f4f6;
            --sidebar-dark: #111827;
            --sidebar-hover: #1f2937;
            --text-dark: #1f2937;
            --text-muted: #6b7280;
            --white: #ffffff;
            --border-color: #e5e7eb;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --transition: all 0.3s ease;
        }
        /* --- Global Reset & Layout --- */
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, sans-serif;
        }
        
        body {
            background-color: var(--bg-light);
            color: var(--text-dark);
            overflow-x: hidden;
        }

        /* --- Sidebar (Kept consistent with Dashboard) --- */

        .sidebar-header {
            padding: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .sidebar-header h2 {
            font-size: 1.25rem;
            font-weight: 700;
        }
        
        .sidebar-header i {
            color: var(--primary-green);
            font-size: 1.5rem;
        }
        
        .sidebar-nav {
            padding: 1rem 0;
            flex-grow: 1;
        }
        
        .sidebar-nav a {
            display: flex;
            align-items: center;
            padding: 0.875rem 1.5rem;
            color: #d1d5db;
            text-decoration: none;
            font-size: 0.95rem;
            transition: var(--transition);
            border-left: 4px solid transparent;
        }
        
        .sidebar-nav a i {
            width: 24px;
            margin-right: 0.75rem;
            font-size: 1.1rem;
            text-align: center;
        }
        
        .sidebar-nav a:hover,
        .sidebar-nav a.active {
            background-color: var(--sidebar-hover);
            color: var(--white);
            border-left-color: var(--primary-green);
        }
        /* --- Main Content & Top Bar --- */

        .page-title {
            font-size: 1.5rem;
            font-weight: 600;
        }
        
        .logout-btn {
            background-color: transparent;
            color: #ef4444;
            border: 1px solid #ef4444;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
        }
        
        .logout-btn:hover {
            background-color: #ef4444;
            color: var(--white);
        }
        
        .content-wrapper {
            padding: 2rem;
            overflow-y: auto;
        }
        /* --- Table Card & Controls --- */
        
        .card {
            background-color: var(--white);
            border-radius: 12px;
            box-shadow: var(--shadow-md);
            overflow: hidden;
        }
        
        .table-controls {
            padding: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
        }
        
        .search-box {
            position: relative;
            width: 100%;
            max-width: 300px;
        }
        
        .search-box i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }
        
        .search-box input {
            width: 100%;
            padding: 0.6rem 1rem 0.6rem 2.5rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 0.95rem;
            outline: none;
            transition: var(--transition);
        }
        
        .search-box input:focus {
            border-color: var(--primary-green);
            box-shadow: 0 0 0 3px rgba(46, 125, 94, 0.15);
        }
        /* --- Data Table --- */
        
        .table-responsive {
            overflow-x: auto;
        }
        
        .data-table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }
        
        .data-table th {
            background-color: #f9fafb;
            padding: 1rem 1.5rem;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            font-weight: 600;
            border-bottom: 1px solid var(--border-color);
        }
        
        .data-table td {
            padding: 1rem 1.5rem;
            vertical-align: middle;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-dark);
            font-size: 0.95rem;
        }
        
        .data-table tbody tr {
            transition: background-color 0.2s ease;
        }
        
        .data-table tbody tr:hover {
            background-color: #f9fafb;
        }
        /* --- Badges & Buttons --- */
        
        .badge {
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: capitalize;
        }
        
        .badge-success {
            background-color: #d1fae5;
            color: #065f46;
        }
        
        .badge-danger {
            background-color: #fee2e2;
            color: #991b1b;
        }
        
        .action-btns {
            display: flex;
            gap: 0.5rem;
        }
        
        .btn-icon {
            width: 32px;
            height: 32px;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            border-radius: 6px;
            text-decoration: none;
            transition: var(--transition);
        }
        
        .btn-view {
            background-color: #eff6ff;
            color: #3b82f6;
            border: 1px solid #bfdbfe;
        }
        
        .btn-view:hover {
            background-color: #3b82f6;
            color: white;
        }
        
        .btn-ban {
            background-color: #fef2f2;
            color: #ef4444;
            border: 1px solid #fecaca;
        }
        
        .btn-ban:hover {
            background-color: #ef4444;
            color: white;
        }
        /* Empty State */
        
        .empty-state {
            padding: 3rem;
            text-align: center;
            color: var(--text-muted);
        }
        /* Mobile */
        
        @media (max-width: 768px) {
            
            /* Simplified for snippet, use previous JS toggle for full mobile support */
            
            .table-controls {
                flex-direction: column;
                gap: 1rem;
            }
            .search-box {
                max-width: 100%;
            }
        }

        </style>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
    <div class="admin-container">
        <aside class="admin-sidebar"></aside>

        <main class="admin-main">
            <header class="admin-top-bar"></header>

            <div class="content-wrapper">
                <div class="card">
                    <div class="table-controls">
                        <div class="search-box">
                            <i class="fas fa-search"></i>
                            <input type="text" id="searchUsers" placeholder="Search users by name or email...">
                        </div>
                    </div>

                    <div class="table-responsive">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Name</th>
                                    <th>Email</th>
                                    <th>Status</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="usersTable">
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="../config.js"></script>
    <script src="../script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            let allUsers = [];
            const tbody = document.getElementById('usersTable');
            const searchInput = document.getElementById('searchUsers');

            // --- Load Real Data ---
            try {
                allUsers = await window.API.getUsers();
                renderTable(allUsers);
            } catch (err) {
                console.error("Failed to load users:", err);
                tbody.innerHTML = `<tr><td colspan="5" class="empty-state" style="color:red;">Error loading users from server.</td></tr>`;
            }

            // Function to render the table
            function renderTable(usersToRender) {
                if (!usersToRender || usersToRender.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="5" class="empty-state">No users found.</td></tr>`;
                    return;
                }

                tbody.innerHTML = usersToRender.map(u => {
                    // Determine badge color safely
                    const status = u.role === 'ADMIN' ? 'Admin' : 'Active';
                    const badgeClass = u.role === 'ADMIN' ? 'badge-success' : 'badge-success';

                    return `
                        <tr>
                            <td>#${u.id}</td>
                            <td style="font-weight: 500;">${u.name}</td>
                            <td style="color: var(--text-muted);">${u.email}</td>
                            <td><span class="badge ${badgeClass}">${status}</span></td>
                            <td>
                                <div class="action-btns">
                                    <a href="user-details.html?id=${u.id}" class="btn-icon btn-view" title="View Profile">
                                        <i class="fas fa-eye"></i>
                                    </a>
                                    <a href="user-status.html?id=${u.id}" class="btn-icon btn-ban" title="Manage User">
                                        <i class="fas fa-ban"></i>
                                    </a>
                                </div>
                            </td>
                        </tr>
                    `;
                }).join('');
            }

            // Real-time Search Filter
            searchInput.addEventListener('input', (e) => {
                const searchTerm = e.target.value.toLowerCase();
                const filteredUsers = allUsers.filter(u =>
                    (u.name || "").toLowerCase().includes(searchTerm) ||
                    (u.email || "").toLowerCase().includes(searchTerm)
                );
                renderTable(filteredUsers);
            });
        });

        function adminLogout() {
            window.Auth.logout('admin');
        }
    </script>
</body>
</html>
