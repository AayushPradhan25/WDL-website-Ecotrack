<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Waste Marketplace | EcoSmart — Buy & Sell Recyclables</title>
<meta name="description" content="Buy and sell recyclable waste materials on EcoSmart's eco-friendly marketplace. Turn waste into wealth!">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../style.css">
<style>

.content-wrapper{padding:1.75rem 2rem;flex:1;}

.mkt-hero{background:linear-gradient(135deg,#064e3b,#10b981,#34d399);border-radius:1.2rem;padding:2rem 2.5rem;color:white;margin-bottom:1.5rem;display:flex;justify-content:space-between;align-items:center;position:relative;overflow:hidden;}
.mkt-hero::after{content:'♻️';position:absolute;right:2rem;top:50%;transform:translateY(-50%);font-size:6rem;opacity:0.15;}
.mkt-hero h1{margin:0 0 0.3rem;font-size:1.7rem;font-weight:800;}
.mkt-hero p{margin:0;opacity:0.9;font-size:0.9rem;}
.coin-box{background:rgba(255,255,255,0.15);backdrop-filter:blur(10px);padding:0.85rem 1.4rem;border-radius:0.9rem;text-align:center;position:relative;z-index:1;}
.coin-box .amt{font-size:1.8rem;font-weight:800;}
.coin-box .lbl{font-size:0.78rem;opacity:0.9;}

.tab-row{display:flex;gap:0.5rem;background:white;padding:0.4rem;border-radius:0.9rem;border:1px solid #e2e8f0;margin-bottom:1.5rem;}
.tab-btn{flex:1;padding:0.85rem;border:none;background:transparent;border-radius:0.7rem;font-weight:700;font-size:0.95rem;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all 0.25s;font-family:inherit;color:#64748b;}
.tab-btn.active{background:linear-gradient(135deg,#10b981,#059669);color:white;box-shadow:0 4px 12px rgba(16,185,129,0.3);}
.tab-btn:not(.active):hover{background:#f0fdf4;color:#10b981;}

.filters-bar{display:flex;gap:0.85rem;margin-bottom:1.5rem;flex-wrap:wrap;}
.search-wrap{flex:1;min-width:240px;position:relative;}
.search-wrap i{position:absolute;left:1rem;top:50%;transform:translateY(-50%);color:#94a3b8;}
.search-input{width:100%;padding:0.75rem 1rem 0.75rem 2.75rem;border:1.5px solid #e2e8f0;border-radius:0.75rem;font-size:0.9rem;font-family:inherit;background:white;}
.search-input:focus{outline:none;border-color:#10b981;box-shadow:0 0 0 3px rgba(16,185,129,0.1);}
.filter-select{padding:0.75rem 1rem;border:1.5px solid #e2e8f0;border-radius:0.75rem;font-size:0.9rem;background:white;cursor:pointer;font-family:inherit;}
.filter-select:focus{outline:none;border-color:#10b981;}

/* PRODUCT GRID — Amazon/Flipkart style */
.products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1.25rem;}
.product-card{background:white;border-radius:1rem;overflow:hidden;border:1px solid #e2e8f0;transition:all 0.25s;position:relative;}
.product-card:hover{transform:translateY(-5px);box-shadow:0 12px 28px rgba(16,185,129,0.12);border-color:#10b981;}
.product-img{height:170px;display:flex;align-items:center;justify-content:center;font-size:4rem;position:relative;}
.product-img .cat-chip{position:absolute;top:10px;left:10px;padding:4px 10px;border-radius:99px;font-size:0.72rem;font-weight:700;}
.product-img .cond-chip{position:absolute;top:10px;right:10px;padding:4px 10px;border-radius:99px;font-size:0.72rem;font-weight:700;background:#d1fae5;color:#059669;}
.bg-plastic{background:linear-gradient(135deg,#fef9c3,#fef3c7);}
.bg-metal{background:linear-gradient(135deg,#dbeafe,#bfdbfe);}
.bg-organic{background:linear-gradient(135deg,#d1fae5,#a7f3d0);}
.bg-paper{background:linear-gradient(135deg,#ede9fe,#ddd6fe);}
.bg-glass{background:linear-gradient(135deg,#cffafe,#a5f3fc);}
.bg-ewaste{background:linear-gradient(135deg,#fee2e2,#fecaca);}
.product-body{padding:1.1rem;}
.product-title{font-size:0.95rem;font-weight:700;color:#1e293b;margin:0 0 0.25rem;line-height:1.35;}
.product-desc{font-size:0.8rem;color:#64748b;margin:0 0 0.85rem;line-height:1.5;}
.product-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.75rem;}
.product-price{font-size:1.3rem;font-weight:800;color:#10b981;}
.product-price small{font-size:0.72rem;color:#94a3b8;font-weight:500;}
.product-seller{font-size:0.78rem;color:#94a3b8;display:flex;align-items:center;gap:4px;}
.product-qty{font-size:0.78rem;color:#64748b;display:flex;align-items:center;gap:4px;}
.buy-btn{width:100%;padding:0.65rem;border:none;border-radius:8px;background:linear-gradient(135deg,#10b981,#059669);color:white;font-weight:700;font-size:0.88rem;cursor:pointer;font-family:inherit;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:6px;}
.buy-btn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(16,185,129,0.3);}

/* SELL FORM — Multi-step */
.sell-wrap{max-width:700px;}
.step-nav{display:flex;gap:0;margin-bottom:2rem;background:white;border-radius:0.9rem;border:1px solid #e2e8f0;padding:0.4rem;}
.step-btn{flex:1;padding:0.75rem;border:none;background:transparent;border-radius:0.7rem;font-weight:600;font-size:0.85rem;cursor:pointer;font-family:inherit;color:#94a3b8;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:6px;}
.step-btn.done{color:#10b981;}
.step-btn.active{background:#10b981;color:white;}
.step-content{display:none;}
.step-content.active{display:block;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
.form-grp{margin-bottom:1.1rem;}
.form-grp label{display:block;font-weight:600;font-size:0.85rem;color:#374151;margin-bottom:0.4rem;}
.form-grp input,.form-grp select,.form-grp textarea{width:100%;padding:0.7rem 0.9rem;border:1.5px solid #e2e8f0;border-radius:8px;font-size:0.9rem;font-family:inherit;background:#f8fafc;box-sizing:border-box;}
.form-grp input:focus,.form-grp select:focus,.form-grp textarea:focus{outline:none;border-color:#10b981;background:white;box-shadow:0 0 0 3px rgba(16,185,129,0.1);}
.upload-zone{border:2px dashed #d1fae5;border-radius:0.75rem;padding:2rem;text-align:center;cursor:pointer;background:#f8fffe;transition:all 0.2s;}
.upload-zone:hover{border-color:#10b981;background:#f0fdf4;}
.upload-zone i{font-size:2.5rem;color:#10b981;margin-bottom:0.5rem;}
.submit-btn{width:100%;padding:0.9rem;border:none;border-radius:0.75rem;background:linear-gradient(135deg,#10b981,#059669);color:white;font-size:1rem;font-weight:700;cursor:pointer;font-family:inherit;transition:all 0.25s;}
.submit-btn:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(16,185,129,0.3);}

.tab-content{display:none;}
.tab-content.active{display:block;}
.empty-state{text-align:center;padding:3rem;color:#94a3b8;}
.empty-state i{font-size:3.5rem;margin-bottom:1rem;display:block;}

@media(max-width:768px){.form-grid{grid-template-columns:1fr;}.mkt-hero{flex-direction:column;gap:1rem;text-align:center;}}
</style>
</head>
<body>
<div class="user-container">
  <aside class="user-sidebar"></aside>
  <main class="user-main">
    <header class="user-header"></header>
    <div class="content-wrapper">

      <div class="mkt-hero">
        <div>
          <h1><i class="fas fa-store"></i> Waste Marketplace</h1>
          <p>Buy & sell recyclable materials. Turn waste into wealth, save the planet! 🌱</p>
        </div>
        <div class="coin-box">
          <div class="amt" id="userCoins">–</div>
          <div class="lbl"><i class="fas fa-coins"></i> Eco Coins</div>
        </div>
      </div>

      <div class="tab-row">
        <button class="tab-btn active" id="buyTabBtn" onclick="switchTab('buy',this)">
          <i class="fas fa-shopping-cart"></i> Buy Waste / Recyclables
        </button>
        <button class="tab-btn" id="sellTabBtn" onclick="switchTab('sell',this)">
          <i class="fas fa-hand-holding-usd"></i> Sell Your Waste
        </button>
      </div>

      <!-- BUY TAB -->
      <div id="buyTab" class="tab-content active">
        <div class="filters-bar">
          <div class="search-wrap">
            <i class="fas fa-search"></i>
            <input type="text" class="search-input" id="searchInput" placeholder="Search recyclables...">
          </div>
          <select class="filter-select" id="catFilter">
            <option value="all">All Categories</option>
            <option value="Plastic">♻️ Plastic</option>
            <option value="Metal">🔩 Metal</option>
            <option value="Organic">🌿 Organic</option>
            <option value="Paper">📄 Paper</option>
            <option value="Glass">🫙 Glass</option>
            <option value="E-Waste">💻 E-Waste</option>
          </select>
          <select class="filter-select" id="sortFilter">
            <option value="default">Sort by: Default</option>
            <option value="price-low">Price: Low to High</option>
            <option value="price-high">Price: High to Low</option>
          </select>
        </div>
        <div class="products-grid" id="productsGrid"></div>
      </div>

      <!-- SELL TAB -->
      <div id="sellTab" class="tab-content">
        <div class="sell-wrap">
          <div class="step-nav">
            <button class="step-btn active" id="step1Btn">1 Details</button>
            <button class="step-btn" id="step2Btn">2 Photo</button>
            <button class="step-btn" id="step3Btn">3 Pricing</button>
          </div>
          <form id="sellForm">
            <div id="step1" class="step-content active">
              <div class="form-grid">
                <div class="form-grp">
                  <label>Item Title *</label>
                  <input type="text" id="sellTitle" placeholder="e.g. Recycled Plastic Pellets 10kg" required>
                </div>
                <div class="form-grp">
                  <label>Category *</label>
                  <select id="sellCat" required>
                    <option value="">Select category</option>
                    <option value="Plastic">♻️ Plastic</option>
                    <option value="Metal">🔩 Metal</option>
                    <option value="Organic">🌿 Organic</option>
                    <option value="Paper">📄 Paper</option>
                    <option value="Glass">🫙 Glass</option>
                    <option value="E-Waste">💻 E-Waste</option>
                  </select>
                </div>
              </div>
              <div class="form-grp">
                <label>Description *</label>
                <textarea id="sellDesc" rows="4" placeholder="Describe the waste — quantity, quality, how it was sorted, etc." required></textarea>
              </div>
              <div class="form-grid">
                <div class="form-grp">
                  <label>Condition</label>
                  <select id="sellCond">
                    <option value="Clean">Clean & Sorted</option>
                    <option value="Mixed">Mixed</option>
                    <option value="As-Is">As-Is</option>
                  </select>
                </div>
                <div class="form-grp">
                  <label>Pickup Location</label>
                  <input type="text" id="sellLoc" placeholder="e.g. Sector 14, New Delhi">
                </div>
              </div>
              <button type="button" class="submit-btn" onclick="goStep(2)">Next: Add Photo <i class="fas fa-arrow-right"></i></button>
            </div>
            <div id="step2" class="step-content">
              <div class="upload-zone" onclick="document.getElementById('photoUpload').click()">
                <i class="fas fa-camera"></i>
                <div style="font-weight:700;margin-bottom:0.3rem;">Upload Photo of Waste</div>
                <div style="font-size:0.82rem;color:#94a3b8;">Click to select — JPG, PNG up to 5MB</div>
                <input type="file" id="photoUpload" accept="image/*" style="display:none" onchange="previewPhoto(this)">
              </div>
              <div id="photoPreview" style="margin-top:1rem;display:none;"><img id="previewImg" style="width:100%;border-radius:0.75rem;max-height:200px;object-fit:cover;" alt="Preview"></div>
              <div style="display:flex;gap:0.75rem;margin-top:1.5rem;">
                <button type="button" class="btn btn-secondary" style="flex:1;" onclick="goStep(1)"><i class="fas fa-arrow-left"></i> Back</button>
                <button type="button" class="submit-btn" style="flex:2;" onclick="goStep(3)">Next: Set Price <i class="fas fa-arrow-right"></i></button>
              </div>
            </div>
            <div id="step3" class="step-content">
              <div class="form-grid">
                <div class="form-grp">
                  <label>Price (Eco Coins) *</label>
                  <input type="number" id="sellPrice" placeholder="e.g. 150" min="1" required>
                </div>
                <div class="form-grp">
                  <label>Quantity *</label>
                  <input type="text" id="sellQty" placeholder="e.g. 10 kg" required>
                </div>
              </div>
              <div class="form-grp">
                <label>Contact Preference</label>
                <select id="sellContact">
                  <option value="Platform">Via Platform Message</option>
                  <option value="Phone">Phone Call</option>
                  <option value="WhatsApp">WhatsApp</option>
                </select>
              </div>
              <div style="background:#f0fdf4;border-radius:0.75rem;padding:1rem;margin-bottom:1.25rem;font-size:0.85rem;color:#374151;">
                <i class="fas fa-info-circle" style="color:#10b981;margin-right:6px;"></i>
                EcoSmart charges <strong>no commission</strong>. All proceeds go directly to you. 🌱
              </div>
              <div style="display:flex;gap:0.75rem;">
                <button type="button" class="btn btn-secondary" style="flex:1;" onclick="goStep(2)"><i class="fas fa-arrow-left"></i> Back</button>
                <button type="submit" class="submit-btn" style="flex:2;"><i class="fas fa-upload"></i> Publish Listing</button>
              </div>
            </div>
          </form>
        </div>
      </div>

    </div>
  </main>
</div>
<script src="../config.js"></script>
    <script src="../script.js"></script>
<script>
const CAT_ICONS={Plastic:'♻️',Metal:'🔩',Organic:'🌿',Paper:'📄',Glass:'🫙','E-Waste':'💻'};
const CAT_BG={Plastic:'bg-plastic',Metal:'bg-metal',Organic:'bg-organic',Paper:'bg-paper',Glass:'bg-glass','E-Waste':'bg-ewaste'};
const CAT_CHIP={Plastic:'badge-warning',Metal:'badge-info',Organic:'badge-success',Paper:'badge-info','E-Waste':'badge-danger',Glass:'badge-info'};

let allListings=[];

function switchTab(name, btn){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(name+'Tab').classList.add('active');
}

function goStep(n){
  [1,2,3].forEach(i=>{
    document.getElementById('step'+i).classList.toggle('active',i===n);
    const btn=document.getElementById('step'+i+'Btn');
    btn.classList.remove('active','done');
    if(i===n)btn.classList.add('active');
    else if(i<n)btn.classList.add('done');
  });
}

function previewPhoto(inp){
  if(!inp.files[0])return;
  const r=new FileReader();
  r.onload=e=>{document.getElementById('previewImg').src=e.target.result;document.getElementById('photoPreview').style.display='block';};
  r.readAsDataURL(inp.files[0]);
}

function renderProducts(items){
  const grid=document.getElementById('productsGrid');
  if(!items.length){
    grid.innerHTML=`<div class="empty-state" style="grid-column:1/-1"><i class="fas fa-box-open"></i>No listings found. Be the first to sell!</div>`;
    return;
  }
  grid.innerHTML=items.map(item=>`
    <div class="product-card" data-cat="${item.category||'Plastic'}" data-price="${item.price}">
      <div class="product-img ${CAT_BG[item.category]||'bg-plastic'}">
        <span style="font-size:3.5rem;">${CAT_ICONS[item.category]||'♻️'}</span>
        <span class="cat-chip badge ${CAT_CHIP[item.category]||'badge-warning'}">${item.category||'Recyclable'}</span>
        <span class="cond-chip">✅ Verified</span>
      </div>
      <div class="product-body">
        <div class="product-title">${item.title}</div>
        <div class="product-desc">${item.description}</div>
        <div class="product-meta">
          <div class="product-price">${item.price} <small>coins</small></div>
          <div class="product-qty"><i class="fas fa-weight-hanging"></i> ${item.quantity||'N/A'}</div>
        </div>
        <div class="product-seller" style="margin-bottom:0.75rem;"><i class="fas fa-store"></i> ${item.seller||item.sellerId||'Eco Seller'}</div>
        <button class="buy-btn" onclick="buyItem(${item.id},'${(item.title||'').replace(/'/g,"\\'")}')">
          <i class="fas fa-shopping-cart"></i> Buy Now
        </button>
      </div>
    </div>`).join('');
}

function applyFilters(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  const cat=document.getElementById('catFilter').value;
  const sort=document.getElementById('sortFilter').value;
  let items=[...allListings];
  if(cat!=='all')items=items.filter(i=>i.category===cat);
  if(q)items=items.filter(i=>(i.title+i.description).toLowerCase().includes(q));
  if(sort==='price-low')items.sort((a,b)=>a.price-b.price);
  if(sort==='price-high')items.sort((a,b)=>b.price-a.price);
  renderProducts(items);
}

async function buyItem(id,title){
  if(!confirm(`Purchase "${title}"?`))return;
  try{
    await window.API.purchaseListing(id);
    window.UI.notify('Purchase successful! Check notifications for details. 🛒','success');
  }catch(e){
    window.UI.notify('Demo: Purchase confirmed! Coins will be deducted in production.','info');
  }
}

document.getElementById('sellForm').addEventListener('submit',async e=>{
  e.preventDefault();
  try{
    await window.API.createListing({
      title:document.getElementById('sellTitle').value,
      category:document.getElementById('sellCat').value,
      description:document.getElementById('sellDesc').value,
      price:parseInt(document.getElementById('sellPrice').value),
      quantity:document.getElementById('sellQty').value,
    });
    window.UI.notify('Listing published! Buyers will contact you. 🎉','success');
    document.getElementById('sellForm').reset();goStep(1);
    loadListings();
  }catch(e){window.UI.notify('Failed to publish listing.','error');}
});

document.getElementById('searchInput').addEventListener('input',applyFilters);
document.getElementById('catFilter').addEventListener('change',applyFilters);
document.getElementById('sortFilter').addEventListener('change',applyFilters);

async function loadListings(){
  try{allListings=await window.API.getListings();}catch(e){allListings=window.ecoState.listings;}
  applyFilters();
}

document.addEventListener('DOMContentLoaded',async()=>{
  try{const u=await window.API.getProfile();document.getElementById('userCoins').textContent=(u.ecoCoins||0).toLocaleString();}catch(e){document.getElementById('userCoins').textContent='750';}
  loadListings();
});
</script>
</body>
</html>
