<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Complaints | EcoSmart</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <style>

        .content-wrapper {
            padding: 1.75rem 2rem;
            flex: 1;
        }
        
        .page-hero {
            background: linear-gradient(135deg, #064e3b, #10b981);
            border-radius: 1rem;
            padding: 1.75rem 2rem;
            color: white;
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .page-hero h1 {
            margin: 0 0 0.3rem;
            font-size: 1.6rem;
            font-weight: 800;
        }
        
        .page-hero p {
            margin: 0;
            opacity: 0.9;
            font-size: 0.9rem;
        }
        
        .filter-tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 0.5rem;
        }
        
        .tab {
            padding: 0.5rem 1rem;
            cursor: pointer;
            color: #64748b;
            font-weight: 600;
            transition: all 0.2s;
            border-bottom: 3px solid transparent;
        }
        
        .tab.active {
            color: #10b981;
            border-bottom-color: #10b981;
        }
        
        .tab:hover {
            color: #10b981;
        }
        
        .table-container {
            overflow-x: auto;
        }
        
        .data-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 0.75rem;
            overflow: hidden;
        }
        
        .data-table thead {
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
        }
        
        .data-table th {
            padding: 1rem;
            text-align: left;
            font-weight: 700;
            color: #64748b;
            font-size: 0.85rem;
            text-transform: uppercase;
        }
        
        .data-table td {
            padding: 1rem;
            border-bottom: 1px solid #f1f5f9;
            color: #334155;
        }
        
        .data-table tbody tr:hover {
            background: #f8fdf4;
        }
        
        .badge {
            padding: 0.3rem 0.8rem;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
        }
        
        .badge-success {
            background: #d1fae5;
            color: #065f46;
        }
        
        .badge-warning {
            background: #fef3c7;
            color: #78350f;
        }
        
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: #94a3b8;
        }
        
        .empty-state i {
            font-size: 3rem;
            margin-bottom: 1rem;
            display: block;
            opacity: 0.3;
        }
        
        .btn {
            padding: 0.6rem 1.2rem;
            border: none;
            border-radius: 0.5rem;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        
        .btn-primary {
            background: #10b981;
            color: white;
        }
        
        .btn-primary:hover {
            background: #059669;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
        }
        
        .btn-secondary {
            background: #e2e8f0;
            color: #475569;
        }
        
        .btn-secondary:hover {
            background: #cbd5e1;
        }
        
        .btn-danger {
            background: #ef4444;
            color: white;
        }
        
        .btn-danger:hover {
            background: #dc2626;
        }
    </style>
</head>

<body>
    <div class="user-container">
        <aside class="user-sidebar"></aside>
        <main class="user-main">
            <header class="user-header"></header>
            <div class="content-wrapper">

                <div class="page-hero">
                    <div>
                        <h1><i class="fas fa-list-check"></i> My Complaints</h1>
                        <p>Track your submitted reports and resolutions</p>
                    </div>
                    <a href="raise-complaint.html" class="btn btn-primary">
                        <i class="fas fa-plus"></i> File New Complaint
                    </a>
                </div>

                <div class="filter-tabs">
                    <div class="tab active" onclick="filterList('all', this)">All Reports</div>
                    <div class="tab" onclick="filterList('pending', this)">Pending</div>
                    <div class="tab" onclick="filterList('in-progress', this)">In Progress</div>
                    <div class="tab" onclick="filterList('resolved', this)">Resolved</div>
                </div>

                <div style="background:white;border-radius:1rem;border:1px solid #e2e8f0;overflow:hidden;">
                    <div class="table-container" id="tableWrapper">
                        <div style="padding:2rem;text-align:center;color:#94a3b8;">
                            <i class="fas fa-spinner fa-spin" style="font-size:1.5rem;margin-bottom:0.5rem;display:block;"></i> Loading complaints...
                        </div>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <script src="../config.js"></script>
    <script src="../script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async() => {
            await renderComplaints('all');
        });

        async function filterList(status, el) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            await renderComplaints(status);
        }

        async function renderComplaints(filter) {
            const wrapper = document.getElementById('tableWrapper');
            wrapper.innerHTML = '<div style="padding:2rem;text-align:center;color:#94a3b8;"><i class="fas fa-spinner fa-spin"></i> Loading...</div>';

            try {
                let data = await window.API.getMyComplaints();

                if (filter !== 'all') {
                    data = data.filter(c => c.status === filter);
                }

                if (data.length === 0) {
                    wrapper.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-clipboard-check"></i>
                    <p>No ${filter !== 'all' ? filter : ''} complaints found.</p>
                </div>`;
                    return;
                }

                let html = `
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Reference ID</th>
                        <th>Title</th>
                        <th>Location</th>
                        <th>Date Filed</th>
                        <th>Status</th>
                        <th style="text-align:right;">Action</th>
                    </tr>
                </thead>
                <tbody>
        `;

                data.forEach(c => {
                    const statusClass = c.status === 'resolved' ? 'badge-success' : 'badge-warning';
                    const formattedDate = new Date(c.createdAt).toLocaleDateString('en-IN');
                    html += `
                <tr>
                    <td><code style="background:#f1f5f9;padding:0.25rem 0.6rem;border-radius:3px;font-weight:bold;font-size:0.8rem;">#${c.id}</code></td>
                    <td><strong>${c.title}</strong></td>
                    <td><small>${c.location}</small></td>
                    <td>${formattedDate}</td>
                    <td><span class="badge ${statusClass}">${c.status.toUpperCase()}</span></td>
                    <td style="text-align:right;">
                        <a href="complaint-details.html?id=${c.id}" class="btn btn-secondary" style="font-size:0.8rem;padding:0.4rem 0.8rem;">
                            <i class="fas fa-eye"></i> View
                        </a>
                    </td>
                </tr>
            `;
                });

                html += '</tbody></table>';
                wrapper.innerHTML = html;
            } catch (err) {
                console.error("Failed to load complaints:", err);
                wrapper.innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-circle"></i><p>Error loading complaints. Check your connection.</p></div>';
            }
        }
    </script>
</body>

</html>
