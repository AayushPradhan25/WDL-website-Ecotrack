<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoSmart | Citizen Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
         :root {
            --primary: #10b981;
            --primary-dark: #059669;
            --primary-light: #6ee7b7;
            --earth: #92400e;
            --leaf: #065f46;
            --light-green: #f0fdf4;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --transition: all 0.3s ease;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, var(--leaf) 0%, #10b981 50%, var(--primary-light) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1rem;
        }
        
        .auth-wrapper {
            width: 100%;
            max-width: 450px;
        }
        
        .auth-card {
            background: white;
            padding: 3rem;
            border-radius: 2.5rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            text-align: center;
            border-top: 5px solid var(--primary);
        }
        
        .logo-section {
            margin-bottom: 2rem;
        }
        
        .logo {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        
        h1 {
            font-size: 1.75rem;
            margin-bottom: 0.3rem;
            color: var(--text-main);
        }
        
        p {
            color: var(--text-muted);
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }
        
        .form-group {
            text-align: left;
            margin-bottom: 1.5rem;
        }
        
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.6rem;
            font-size: 0.9rem;
            color: var(--text-main);
        }
        
        input {
            width: 100%;
            padding: 0.9rem 1.2rem;
            border-radius: 1rem;
            border: 2px solid #e2e8f0;
            outline: none;
            transition: var(--transition);
            font-family: 'Outfit', sans-serif;
            font-size: 0.95rem;
        }
        
        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
            background: rgba(16, 185, 129, 0.02);
        }
        
        .btn-submit {
            width: 100%;
            padding: 1.1rem;
            border-radius: 1rem;
            border: none;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 1.5rem;
            font-size: 1rem;
        }
        
        .btn-submit:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(16, 185, 129, 0.3);
        }
        
        .btn-submit:active {
            transform: translateY(-1px);
        }
        
        .divider {
            display: flex;
            align-items: center;
            margin: 2rem 0;
        }
        
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e2e8f0;
        }
        
        .divider span {
            margin: 0 1rem;
            color: var(--text-muted);
            font-size: 0.85rem;
        }
        
        .social-login {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 2rem;
        }
        
        .social-btn {
            padding: 0.9rem;
            border-radius: 1rem;
            border: 2px solid #e2e8f0;
            background: white;
            color: var(--text-main);
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-size: 0.9rem;
        }
        
        .social-btn:hover {
            border-color: var(--primary);
            background: rgba(16, 185, 129, 0.05);
        }
        
        .social-btn i {
            font-size: 1.2rem;
        }
        
        .apple-btn:hover {
            border-color: #000;
            background: #000;
            color: white;
        }
        
        .google-btn:hover {
            border-color: #4285f4;
            background: #4285f4;
            color: white;
        }
        
        .footer-section {
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid #e2e8f0;
        }
        
        .footer-link {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 0.8rem;
        }
        
        .footer-link a {
            color: var(--primary);
            font-weight: 600;
            text-decoration: none;
            transition: var(--transition);
        }
        
        .footer-link a:hover {
            color: var(--primary-dark);
            text-decoration: underline;
        }
        
        .signup-link {
            background: rgba(16, 185, 129, 0.1);
            padding: 1rem;
            border-radius: 1rem;
            margin-top: 1rem;
        }
        
        .forgot-password {
            text-align: right;
            margin-top: -0.8rem;
            margin-bottom: 1rem;
        }
        
        .forgot-password a {
            color: var(--primary);
            font-weight: 600;
            text-decoration: none;
            font-size: 0.85rem;
            transition: var(--transition);
        }
        
        .forgot-password a:hover {
            color: var(--primary-dark);
        }
        
        @media (max-width: 480px) {
            .auth-card {
                padding: 2rem 1.5rem;
            }
            .logo {
                font-size: 2rem;
            }
            h1 {
                font-size: 1.5rem;
            }
            .social-login {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="logo-section">
                <div class="logo">
                    <i class="fas fa-leaf"></i> EcoSmart
                </div>
                <h1>Citizen Login</h1>
                <p>Join the sustainable waste management revolution</p>
            </div>

            <form id="loginForm">
                <div class="social-login">
                    <button type="button" class="social-btn google-btn" onclick="window.Auth.loginGoogle && window.Auth.loginGoogle()">
                        <i class="fab fa-google"></i> Google
                    </button>
                    <button type="button" class="social-btn apple-btn" onclick="window.Auth.loginApple && window.Auth.loginApple()">
                        <i class="fab fa-apple"></i> Apple
                    </button>
                </div>

                <div class="divider">
                    <span>Or continue with email</span>
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="john@example.com" required>
                </div>

                <div class="form-group">
                    <div class="forgot-password">
                        <a href="forgot-password.html">Forgot password?</a>
                    </div>
                    <label>Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <button type="submit" id="loginBtn" class="btn-submit">
                    <i class="fas fa-sign-in-alt"></i> Sign In
                </button>
            </form>

            <div class="footer-section">
                <div class="signup-link">
                    <div class="footer-link">
                        Don't have an account?
                    </div>
                    <a href="signup.html" class="btn" style="background: var(--primary); color: white; padding: 0.8rem 2rem; border-radius: 1rem; display: inline-block; width: 100%; text-align: center;">
                        <i class="fas fa-user-plus"></i> Create New Account
                    </a>
                </div>

                <div style="margin-top: 1.5rem; font-size: 0.8rem; color: var(--text-muted);">
                    By signing in, you agree to our<br>
                    <a href="#" style="color: var(--primary); text-decoration: none;">Terms & Conditions</a> and
                    <a href="#" style="color: var(--primary); text-decoration: none;">Privacy Policy</a>
                </div>
            </div>
        </div>
    </div>

    <script src="../config.js"></script>
    <script src="../script.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async(e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');

            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in...';
            btn.disabled = true;

            try {
                await window.Auth.login('user', email, password);
            } catch (err) {
                console.error('Login failed:', err);
                btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
                btn.disabled = false;
            }
        });

        // Placeholder for social login integration
        window.Auth.loginGoogle = function() {
            console.log('Google login integration - to be connected with Google OAuth');
            if(window.UI) window.UI.notify('Google login integration coming soon', 'info');
        };

        window.Auth.loginApple = function() {
            console.log('Apple login integration - to be connected with Apple Sign In');
            if(window.UI) window.UI.notify('Apple login integration coming soon', 'info');
        };
    </script>
</body>

</html>
