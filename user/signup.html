<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoSmart | Join the Green Revolution</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #10b981;
            --primary-dark: #064e3b;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --bg-light: #f8fafc;
            --transition: all 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            background: #f1f5f9;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: var(--text-main);
        }

        .auth-card {
            background: white;
            padding: 3rem;
            border-radius: 2rem;
            box-shadow: 0 20px 50px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        .logo { font-size: 2rem; font-weight: 800; color: var(--primary); margin-bottom: 1rem; }
        h1 { font-size: 1.75rem; margin-bottom: 0.5rem; }
        p { color: var(--text-muted); margin-bottom: 2.5rem; }

        .form-group { text-align: left; margin-bottom: 1.5rem; }
        label { display: block; font-weight: 600; margin-bottom: 0.5rem; font-size: 0.9rem; }
        input {
            width: 100%;
            padding: 0.8rem 1.2rem;
            border-radius: 1rem;
            border: 1px solid #e2e8f0;
            outline: none;
            transition: var(--transition);
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1); }

        .btn-submit {
            width: 100%;
            padding: 1rem;
            border-radius: 1rem;
            border: none;
            background: var(--primary);
            color: white;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 1rem;
        }
        .btn-submit:hover { background: var(--primary-dark); transform: translateY(-2px); }
        .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }

        .footer-link { margin-top: 2rem; font-size: 0.9rem; color: var(--text-muted); }
        .footer-link a { color: var(--primary); font-weight: 600; text-decoration: none; }
    </style>
</head>

<body>
    <div class="auth-card">
        <div class="logo"><i class="fas fa-leaf"></i> EcoSmart</div>
        <h1>Create Account</h1>
        <p>Join thousands of citizens making their city cleaner.</p>

        <form id="signupForm">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="name" placeholder="John Doe" required>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="john@example.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required minlength="6">
            </div>
            <button type="submit" id="submitBtn" class="btn-submit">Create Account</button>
        </form>

        <div class="footer-link">
            Already have an account? <a href="login.html">Log in</a>
        </div>
    </div>

    <!-- Core Logic -->
    <script src="../config.js"></script>
    <script src="../script.js"></script>
    <script>
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                btn.disabled = true;
                btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Processing...';
                
                // Using consolidated Auth.register from script.js
                await window.Auth.register(name, email, password);
                
                window.UI.notify('Account created! Redirecting to login...');
                setTimeout(() => window.location.href = 'login.html', 2000);
            } catch (err) {
                btn.disabled = false;
                btn.innerHTML = 'Create Account';
                window.UI.notify(err.message || 'Registration failed', 'error');
            }
        });
    </script>
</body>

</html>
